<script type="module">
import * as DB from "./db.js";
const { MODE, auth, DISCIPLINES, STATES, CATEGORIES } = DB;

/* ---------- tiny DOM helper ---------- */
function h(tag, props = {}, ...kids) {
  const e = document.createElement(tag);
  for (const k in props) {
    const v = props[k];
    if (v == null || v === false) continue;
    if (k === "class") e.className = v;
    else if (k === "html") e.innerHTML = v;
    else if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k.startsWith("on") && typeof v === "function") e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const kid of kids.flat()) {
    if (kid == null || kid === false) continue;
    e.append(kid.nodeType ? kid : document.createTextNode(kid));
  }
  return e;
}
const $ = s => document.querySelector(s);
const lensLabel = k => (DISCIPLINES.find(d => d.key === k) || {}).label || k;
const stateLabel = k => (STATES.find(s => s.key === k) || {}).label || k;
const catLabel = k => (CATEGORIES.find(c => c.key === k) || {}).label || k;

const ICON = {
  edit: '<svg viewBox="0 0 24 24" fill="none"><path d="M4 20h4L18.5 9.5a2.1 2.1 0 0 0-3-3L5 17v3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>',
  trash: '<svg viewBox="0 0 24 24" fill="none"><path d="M5 7h14M10 7V5h4v2M6 7l1 12h10l1-12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  chevron: '<svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  book: '<svg viewBox="0 0 24 24" fill="none"><path d="M5 4h11a2 2 0 0 1 2 2v14H7a2 2 0 0 1-2-2V4Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>',
  spark: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 3l1.8 5L19 9.8 13.8 12 12 17l-1.8-5L5 9.8 10.2 8 12 3Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>',
  eye: '<svg viewBox="0 0 24 24" fill="none"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" stroke="currentColor" stroke-width="1.7"/><circle cx="12" cy="12" r="2.6" stroke="currentColor" stroke-width="1.7"/></svg>',
  globe: '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18M12 3c3 3.5 3 14.5 0 18M12 3c-3 3.5-3 14.5 0 18" stroke="currentColor" stroke-width="1.5"/></svg>',
  layers: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 3l9 5-9 5-9-5 9-5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M3 13l9 5 9-5" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>',
  up: '<svg viewBox="0 0 24 24" fill="none"><path d="M6 14l6-6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  down: '<svg viewBox="0 0 24 24" fill="none"><path d="M6 10l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  image: '<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.7"/><circle cx="8.5" cy="10" r="1.6" stroke="currentColor" stroke-width="1.5"/><path d="M5 17l4.5-4 3 2.5L16 12l3 3" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>',
  grip: '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>',
};

function toast(msg) {
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove("show"), 1900);
}
function slugify(s) {
  return (s || "").toLowerCase().replace(/&[a-z]+;/g, "").replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
}

/* ---------- drag + arrow reordering ---------- */
let _dragSrc = null;
function moveInArray(arr, from, to) { if (from < 0 || to < 0 || from >= arr.length || to >= arr.length) return; const x = arr.splice(from, 1)[0]; arr.splice(to, 0, x); }
async function persistOrder(kind, ids) { try { await DB.reorderRows(kind, ids); } catch (e) { toast("Couldn't save order"); } render(); }
function arrowMove(kind, ids, id, dir) { const i = ids.indexOf(id), j = i + dir; if (j < 0 || j >= ids.length) return; moveInArray(ids, i, j); persistOrder(kind, ids); }
function dndRow(row, id, ids, kind) {
  const handle = row.querySelector(".drag");
  if (handle) {
    handle.setAttribute("draggable", "true");
    handle.addEventListener("dragstart", e => { _dragSrc = id; e.dataTransfer.effectAllowed = "move"; try { e.dataTransfer.setData("text/plain", String(id)); } catch (_e) {} row.classList.add("dragging"); });
    handle.addEventListener("dragend", () => { _dragSrc = null; row.classList.remove("dragging"); document.querySelectorAll(".drow.dragover").forEach(r => r.classList.remove("dragover")); });
  }
  row.addEventListener("dragover", e => { if (_dragSrc == null || _dragSrc === id) return; e.preventDefault(); e.dataTransfer.dropEffect = "move"; row.classList.add("dragover"); });
  row.addEventListener("dragleave", () => row.classList.remove("dragover"));
  row.addEventListener("drop", e => { e.preventDefault(); row.classList.remove("dragover"); if (_dragSrc == null || _dragSrc === id) return; const from = ids.indexOf(_dragSrc), to = ids.indexOf(id); moveInArray(ids, from, to); persistOrder(kind, ids); });
}

/* ---------- modal + form ---------- */
function closeModal() { $("#modalRoot").innerHTML = ""; }
function openModal(title, bodyNodes, footNodes) {
  const overlay = h("div", { class: "modal-overlay", onclick: e => { if (e.target === overlay) closeModal(); } },
    h("div", { class: "modal", role: "dialog", "aria-modal": "true" },
      h("div", { class: "modal-head" }, h("h3", {}, title),
        h("button", { class: "ibtn", onclick: closeModal, "aria-label": "Close" }, h("span", { html: '<svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>' }))),
      h("div", { class: "modal-body" }, ...bodyNodes),
      h("div", { class: "modal-foot" }, ...footNodes)));
  $("#modalRoot").innerHTML = ""; $("#modalRoot").append(overlay);
  const first = overlay.querySelector("input,select,textarea"); if (first) first.focus();
}

// fieldDefs: {name,label,type:'text'|'textarea'|'select'|'lenses',options,hint,full}
function formModal({ title, fields, values = {}, submitLabel = "Save", onSave }) {
  const refs = {};
  const nodes = fields.map(f => {
    let input;
    if (f.type === "textarea") input = h("textarea", { id: "f_" + f.name }, values[f.name] || "");
    else if (f.type === "select") {
      input = h("select", { id: "f_" + f.name }, ...f.options.map(o =>
        h("option", { value: o.value, ...(String(values[f.name]) === String(o.value) ? { selected: "" } : {}) }, o.label)));
    } else if (f.type === "lenses") {
      const chosen = new Set(values[f.name] || []);
      input = h("div", { class: "lenspick" }, ...DISCIPLINES.map(d => {
        const b = h("button", { type: "button", "aria-pressed": chosen.has(d.key) ? "true" : "false", style: `--c:var(--${d.key})` },
          h("i"), d.label);
        b.addEventListener("click", () => {
          const on = b.getAttribute("aria-pressed") === "true";
          b.setAttribute("aria-pressed", on ? "false" : "true");
          on ? chosen.delete(d.key) : chosen.add(d.key);
        });
        return b;
      }));
      refs[f.name] = () => [...chosen];
    } else input = h("input", { id: "f_" + f.name, type: f.type || "text", value: values[f.name] || "", placeholder: f.placeholder || "" });
    if (!refs[f.name]) refs[f.name] = () => input.value;
    return h("div", { class: "field" + (f.full ? "" : ""), }, h("label", { for: "f_" + f.name }, f.label), input, f.hint ? h("div", { class: "hint" }, f.hint) : null);
  });
  if (title.startsWith("Edit lesson") || title.startsWith("New lesson")) {
    nodes.push(h("div", { class: "future" },
      h("span", { html: ICON.spark }),
      h("div", {}, h("b", {}, "Lesson content"), " is written by the Claude API. Save this, then press ",
        h("b", {}, "Generate"), " on the lesson row to create the full lesson from its title and lenses.")));
  }
  const save = h("button", { class: "btn btn-primary" }, submitLabel);
  save.addEventListener("click", async () => {
    const out = {}; for (const f of fields) out[f.name] = refs[f.name]();
    save.disabled = true; save.textContent = "Saving…";
    try { await onSave(out); closeModal(); }
    catch (ex) { save.disabled = false; save.textContent = submitLabel; toast(ex?.message || "Save failed"); }
  });
  openModal(title, nodes, [h("button", { class: "btn btn-ghost", onclick: closeModal }, "Cancel"), save]);
}

function confirmModal(title, message, onYes, danger = true) {
  const yes = h("button", { class: "btn " + (danger ? "btn-danger" : "btn-primary") }, "Delete");
  yes.addEventListener("click", async () => { yes.disabled = true; yes.textContent = "Deleting…"; try { await onYes(); closeModal(); } catch (ex) { yes.disabled = false; yes.textContent = "Delete"; toast(ex?.message || "Failed"); } });
  openModal(title, [h("p", { style: { color: "var(--ink-soft)", lineHeight: "1.55", margin: "2px 0" } }, message)],
    [h("button", { class: "btn btn-ghost", onclick: closeModal }, "Cancel"), yes]);
}

/* ---------- app state + navigation ---------- */
const state = { view: "chapters", chapterId: null, sectionId: null, chapter: null, section: null };
const view = $("#view");
const setBusy = () => { view.innerHTML = '<div class="spin"></div>'; };

function pageHead(titleText, lede, actionNode) {
  return h("div", { class: "page-head" },
    h("div", {}, h("h1", {}, titleText), lede ? h("p", { class: "lede" }, lede) : null),
    actionNode || null);
}
function crumbs(parts) {
  const c = h("div", { class: "crumbs" });
  parts.forEach((p, i) => {
    if (i) c.append(h("span", { class: "sep" }, "/"));
    c.append(p.onclick ? h("a", { onclick: p.onclick }, p.label) : h("span", {}, p.label));
  });
  return c;
}
function demoBanner() {
  if (MODE !== "demo") return null;
  return h("div", { class: "banner demo" },
    h("span", { html: '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 8h.01M11 12h1v4h1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' }),
    h("div", {}, h("b", {}, "Demo mode — changes stay in this browser only. "),
      "Add your Supabase URL + key to ", h("code", {}, "config.js"), " to make this a real backend. ",
      h("a", { href: "SETUP.md", target: "_blank" }, "Setup guide →")));
}

async function go(v, opts = {}) { Object.assign(state, opts, { view: v }); render(); }

/* ---------- views ---------- */
async function render() {
  setBusy();
  try {
    if (state.view === "chapters") return await viewChapters();
    if (state.view === "chapter") return await viewChapter();
    if (state.view === "section") return await viewSection();
    if (state.view === "editor") return viewLessonEditor();
  } catch (ex) {
    view.innerHTML = "";
    view.append(h("div", { class: "empty" }, h("p", {}, "Couldn’t load data: " + (ex?.message || ex))));
  }
}

async function viewChapters() {
  const [chapters, ct] = await Promise.all([DB.listChapters(), DB.counts()]);
  view.innerHTML = "";
  view.append(
    pageHead("Chapters", "Everything students see is built from these. Drafts stay hidden from the public site until published.",
      h("button", { class: "btn btn-primary", onclick: () => editChapter() }, h("span", { html: ICON.plus, style: { display: "inline-flex", width: "16px" } }), "New chapter")),
    demoBanner());
  if (!chapters.length) {
    view.append(h("div", { class: "panel" }, h("div", { class: "empty" }, h("span", { html: ICON.book }), h("p", {}, "No chapters yet."), h("button", { class: "btn btn-primary", onclick: () => editChapter() }, "Create the first chapter"))));
    return;
  }
  const panel = h("div", { class: "panel" });
  chapters.forEach(c => {
    const stat = ct.perChapter[c.id] || { sections: 0, lessons: 0 };
    panel.append(h("div", { class: "drow", style: `--accent:var(--${c.category === "foundations" ? "biochem" : "patho"})` },
      h("span", { class: "num" }, String(c.order_index).padStart(2, "0")),
      h("div", { class: "grow" },
        h("div", { class: "t", onclick: () => go("chapter", { chapterId: c.id }) }, c.title),
        h("div", { class: "m" },
          h("span", {}, catLabel(c.category)),
          h("span", {}, "·"), h("span", {}, stat.sections + " sections"),
          h("span", {}, "·"), h("span", {}, stat.lessons + " lessons"),
          c.slug ? h("span", { style: { fontFamily: "var(--f-mono)", fontSize: ".72rem" } }, "/" + c.slug) : null)),
      h("span", { class: "pill " + c.status }, c.status),
      h("div", { class: "actions" },
        h("a", { class: "manage", onclick: () => go("chapter", { chapterId: c.id }) }, "Manage", h("span", { html: ICON.chevron })),
        h("button", { class: "ibtn", title: "Edit", onclick: () => editChapter(c), html: ICON.edit }),
        h("button", { class: "ibtn danger", title: "Delete", onclick: () => removeChapter(c), html: ICON.trash }))));
  });
  view.append(panel);
}

async function viewChapter() {
  const chapters = await DB.listChapters();
  const c = chapters.find(x => x.id === state.chapterId);
  if (!c) return go("chapters");
  state.chapter = c;
  const sections = await DB.listSections(c.id);
  view.innerHTML = "";
  view.append(crumbs([{ label: "Chapters", onclick: () => go("chapters") }, { label: c.title }]));
  view.append(pageHead(c.title, c.subtitle,
    h("div", { style: { display: "flex", gap: "8px" } },
      h("a", { class: "btn btn-ghost", href: "chapter.html?slug=" + encodeURIComponent(c.slug), target: "_blank", rel: "noopener" }, "View ↗"),
      h("button", { class: "btn btn-ghost", onclick: () => editChapter(c) }, "Edit chapter"),
      h("button", { class: "btn btn-ghost", onclick: () => importChecklist(c) }, h("span", { html: ICON.spark, style: { display: "inline-flex", width: "15px" } }), "Import checklist"),
      h("button", { class: "btn btn-primary", onclick: () => editSection(null) }, h("span", { html: ICON.plus, style: { display: "inline-flex", width: "16px" } }), "New section"))));
  view.append(h("div", { style: { display: "flex", gap: "10px", margin: "-6px 0 18px", alignItems: "center" } },
    h("span", { class: "pill " + c.status }, c.status),
    h("span", { style: { fontSize: ".84rem", color: "var(--ink-soft)" } }, catLabel(c.category)),
    h("button", { class: "btn btn-ghost sm", onclick: () => togglePublish(c) }, c.status === "published" ? "Unpublish" : "Publish")));

  if (!sections.length) {
    view.append(h("div", { class: "panel" }, h("div", { class: "empty" }, h("span", { html: ICON.book }), h("p", {}, "No sections in this chapter yet."), h("button", { class: "btn btn-primary", onclick: () => editSection(null) }, "Add a section"))));
    return;
  }
  const counts = await DB.counts();
  const panel = h("div", { class: "panel" });
  const secIds = sections.map(s => s.id);
  sections.forEach(s => {
    const n = counts.perSection[s.id] || 0;
    const row = h("div", { class: "drow", style: "--accent:var(--physio)" },
      h("span", { class: "drag", title: "Drag to reorder", html: ICON.grip }),
      h("span", { class: "num" }, s.numeral || "–"),
      h("div", { class: "grow" },
        h("div", { class: "t", onclick: () => go("section", { sectionId: s.id }) }, s.title),
        h("div", { class: "m" }, h("span", {}, n + " lesson" + (n === 1 ? "" : "s")))),
      h("div", { class: "actions" },
        h("button", { class: "ibtn", title: "Move up", onclick: () => arrowMove("sections", secIds, s.id, -1), html: ICON.up }),
        h("button", { class: "ibtn", title: "Move down", onclick: () => arrowMove("sections", secIds, s.id, 1), html: ICON.down }),
        h("a", { class: "manage", onclick: () => go("section", { sectionId: s.id }) }, "Lessons", h("span", { html: ICON.chevron })),
        h("button", { class: "ibtn", title: "Edit", onclick: () => editSection(s), html: ICON.edit }),
        h("button", { class: "ibtn danger", title: "Delete", onclick: () => removeSection(s), html: ICON.trash })));
    dndRow(row, s.id, secIds, "sections");
    panel.append(row);
  });
  view.append(panel);
}

async function viewSection() {
  const c = state.chapter || (await DB.listChapters()).find(x => x.id === state.chapterId);
  const sections = await DB.listSections(state.chapterId || (c && c.id));
  const s = sections.find(x => x.id === state.sectionId) || (await findSection(state.sectionId));
  if (!s) return go("chapters");
  state.section = s; state.chapterId = s.chapter_id;
  const chapter = c || (await DB.listChapters()).find(x => x.id === s.chapter_id);
  const lessons = await DB.listLessons(s.id);
  view.innerHTML = "";
  view.append(crumbs([
    { label: "Chapters", onclick: () => go("chapters") },
    { label: chapter ? chapter.title : "Chapter", onclick: () => go("chapter", { chapterId: s.chapter_id }) },
    { label: (s.numeral ? s.numeral + " · " : "") + s.title }]));
  view.append(pageHead(s.title, "Lessons in this section. Order, lenses and status here drive the public syllabus.",
    h("button", { class: "btn btn-primary", onclick: () => editLesson(null) }, h("span", { html: ICON.plus, style: { display: "inline-flex", width: "16px" } }), "New lesson")));
  if (!lessons.length) {
    view.append(h("div", { class: "panel" }, h("div", { class: "empty" }, h("span", { html: ICON.book }), h("p", {}, "No lessons yet."), h("button", { class: "btn btn-primary", onclick: () => editLesson(null) }, "Add a lesson"))));
    return;
  }
  const panel = h("div", { class: "panel" });
  const lesIds = lessons.map(l => l.id);
  lessons.forEach(l => {
    const hasContent = !!l.content;
    const genBtn = h("button", { class: "btn btn-ghost sm gen" },
      h("span", { html: ICON.spark, style: { display: "inline-flex", width: "15px" } }),
      hasContent ? "Regenerate" : "Generate");
    genBtn.addEventListener("click", () => generateFor(l, genBtn));

    const row = h("div", { class: "drow" },
      h("span", { class: "drag", title: "Drag to reorder", html: ICON.grip }),
      h("span", { class: "ticks" }, ...(l.lenses.length ? l.lenses : ["physio"]).map(k =>
        h("i", { style: `background:var(--${k})` }))),
      h("div", { class: "grow" },
        h("div", { class: "t", onclick: () => editLesson(l) }, (l.high_yield ? "⭐ " : "") + l.title),
        h("div", { class: "m" },

/* ---------- checklist import ---------- */
function lensForName(name) {
  const n = (name || "").toLowerCase();
  const map = [["embryo", "embryo"], ["anatom", "anatomy"], ["physiolog", "physio"], ["histolog", "histo"],
    ["patholog", "patho"], ["pharmacolog", "pharm"], ["microbiolog", "micro"], ["biochem", "biochem"]];
  for (const [w, k] of map) if (n.includes(w)) return k;
  return "";
}
function parseChecklist(md) {
  const lines = (md || "").split(/\r?\n/);
  const sections = []; let sec = null, lesson = null;
  const tidy = s => s.replace(/\s+/g, " ").trim();
  for (const raw of lines) {
    const line = raw.replace(/\s+$/, "");
    let m;
    if ((m = line.match(/^##\s+(.+)$/)) && !line.startsWith("###")) {
      let t = tidy(m[1]).replace(/^SECTION\s*\d*\s*[—\-:]*\s*/i, "");
      sec = { numeral: "", title: t, lens: lensForName(t), lessons: [] };
      sections.push(sec); lesson = null; continue;
    }
    if ((m = line.match(/^###\s+(.+)$/))) {
      if (!sec) { sec = { numeral: "", title: "General", lens: "", lessons: [] }; sections.push(sec); }
      let t = tidy(m[1]).replace(/^Lesson\s*[\d.]*\s*[—\-:]*\s*/i, "");
      const hy = /[⭐★]/.test(t);
      t = t.replace(/[⭐★]/g, "").trim();
      lesson = { title: t, high_yield: hy, must_cover: [] };
      sec.lessons.push(lesson); continue;
    }
    m = line.match(/^\s*-\s*\[[ xX]?\]\s*(.+)$/) || line.match(/^\s*[-*]\s+(.+)$/);
    if (m) { const pt = tidy(m[1]); if (lesson && pt) lesson.must_cover.push(pt); continue; }
  }
  return sections.filter(s => s.lessons.length);
}
function importChecklist(c) {
  const ta = h("textarea", { placeholder: "Paste your checklist markdown here…",
    style: { width: "100%", minHeight: "260px", fontFamily: "var(--f-mono)", fontSize: ".78rem", lineHeight: "1.5" } });
  const info = h("div", { class: "hint" }, "Uses ## sections, ### lessons (⭐ = high-yield), and “- [ ] point” lines. Creates sections, lessons, points and lens colours.");
  const preview = h("div", { style: { fontSize: ".85rem", color: "var(--brand)", fontWeight: "600", margin: "10px 0 2px" } });
  let parsed = [];
  const update = () => {
    parsed = parseChecklist(ta.value);
    const ls = parsed.reduce((n, s) => n + s.lessons.length, 0);
    const pts = parsed.reduce((n, s) => n + s.lessons.reduce((m, l) => m + l.must_cover.length, 0), 0);
    preview.textContent = parsed.length ? `Will create ${parsed.length} sections · ${ls} lessons · ${pts} must-cover points.` : "Nothing parsed yet — paste a checklist above.";
  };
  ta.addEventListener("input", update); update();
  const imp = h("button", { class: "btn btn-primary" }, "Import");
  imp.addEventListener("click", async () => {
    if (!parsed.length) { toast("Nothing to import"); return; }
    imp.disabled = true; imp.textContent = "Importing…";
    try { const r = await DB.importSyllabus(c.id, parsed); toast(`Imported ${r.sections} sections, ${r.lessons} lessons`); closeModal(); render(); }
    catch (ex) { imp.disabled = false; imp.textContent = "Import"; toast(ex?.message || "Import failed"); }
  });
  openModal("Import checklist — " + c.title, [info, ta, preview],
    [h("button", { class: "btn btn-ghost", onclick: closeModal }, "Cancel"), imp]);
}

/* ---------- boot ---------- */
$("#navChapters").addEventListener("click", () => go("chapters"));
$("#signout").addEventListener("click", async () => { await auth.signOut(); location.href = "login.html"; });

(async function boot() {
  $("#modeBadge").textContent = MODE === "live" ? "Live · Supabase" : "Demo";
  $("#modeBadge").className = "mode-badge " + MODE;
  let user = await auth.getUser();
  if (!user && MODE === "demo") { user = await auth.signIn("demo@medlens.app"); }  // frictionless preview
  if (!user) { location.href = "login.html"; return; }
  $("#who").textContent = user.email || "";
  $("#sideFoot").textContent = MODE === "live" ? "Connected to Supabase." : "Demo data · resets are local.";

  if (MODE === "live") {
    const admin = await auth.isAdmin();
    if (!admin) {
      view.innerHTML = "";
      view.append(h("div", { class: "banner demo", style: { marginTop: "20px" } },
        h("span", { html: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 4l9 16H3L12 4Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M12 10v4M12 17h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>' }),
        h("div", {}, h("b", {}, "You’re signed in but not an admin. "),
          "Writes are blocked by Row-Level Security. Promote your account in Supabase: ",
          h("code", {}, "update profiles set role='admin' where email='" + (user.email || "you@example.com") + "';"))));
      return;
    }
  }
  render();
})();
</script>
<script src="app.js"></script>
</body>
</html>
